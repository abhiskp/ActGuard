policies:
  - id: block_mass_delete
    description: Block file delete operations when the requested delete count is high.
    priority: 100
    effect: block
    risk_score: 95
    reason: Mass delete operations are blocked by policy.
    conditions:
      tool_name:
        equals: file_store
      action:
        equals: delete
      parameters:
        - path: count
          greater_than: 5

  - id: block_dangerous_admin_actions
    description: Block dangerous administrative mock-tool actions.
    priority: 98
    effect: block
    risk_score: 98
    reason: Dangerous administrative actions are blocked by policy.
    conditions:
      tool_name:
        equals: admin
      action:
        in:
          - disable_mfa
          - rotate_root_key

  - id: block_external_data_transfer
    description: Block transfers to external destinations.
    priority: 90
    effect: block
    risk_score: 90
    reason: External data transfer is blocked by policy.
    conditions:
      action:
        equals: transfer
      parameters:
        - path: destination_type
          equals: external

  - id: require_approval_partner_domain_transfer
    description: Require approval for transfers to partner domains matching a risky pattern.
    priority: 88
    effect: require_approval
    risk_score: 72
    reason: Partner-domain transfer matches a risky destination pattern.
    conditions:
      action:
        equals: transfer
      parameters:
        - path: destination_type
          equals: partner
        - path: destination_domain
          regex: ".*\\.external\\.example$"

  - id: block_sensitive_crm_field_lookup
    description: Block CRM reads that request sensitive fields.
    priority: 85
    effect: block
    risk_score: 84
    reason: CRM lookup requests sensitive fields.
    conditions:
      tool_name:
        equals: crm
      action:
        equals: read
      parameters:
        - path: fields
          contains: ssn

  - id: suspicious_crm_finance_delete_sequence
    description: Flag the sequence of CRM read, financial export, then file deletion.
    priority: 80
    effect: block
    risk_score: 92
    reason: Suspicious CRM to finance export to delete sequence detected.
    conditions:
      sequence:
        - tool_name:
            equals: crm
          action:
            equals: read
        - tool_name:
            equals: finance
          action:
            equals: export
        - tool_name:
            equals: file_store
          action:
            equals: delete

  - id: require_approval_financial_export
    description: Require human approval for cross-border financial exports.
    priority: 70
    effect: require_approval
    risk_score: 75
    reason: Cross-border financial exports require human approval.
    conditions:
      tool_name:
        equals: finance
      action:
        equals: export
      parameters:
        - path: report_type
          equals: financial
        - path: cross_border
          equals: true

  - id: allow_small_file_delete
    description: Allow low-volume mock file deletes.
    priority: 20
    effect: allow
    risk_score: 25
    reason: Low-volume mock file delete is allowed.
    conditions:
      tool_name:
        equals: file_store
      action:
        equals: delete
      parameters:
        - path: count
          less_than: 3

  - id: allow_read_only_crm_lookup
    description: Allow read-only CRM customer lookup.
    priority: 10
    effect: allow
    risk_score: 10
    reason: Read-only CRM customer lookup is allowed.
    conditions:
      tool_name:
        equals: crm
      action:
        equals: read
